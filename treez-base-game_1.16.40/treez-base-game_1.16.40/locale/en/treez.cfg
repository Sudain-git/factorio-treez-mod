[technology-description]
treez-tree-growth=Replanting trees through seeds.
treez-tree-seeder=Unlocks the Tree Seeder area tool. Select a region and construction robots will automatically plant tree seeds across it from your logistic network.
treez-sapling-growth=Doubles trees that can grow simultaneously.
treez-cloudseeding=Increases tree growth queue and increases the number of seeds that get placed per thunderstorm.
treez-soil-enrichment=Adds 1% chance of upgrading tile beneath a sapling per stage of growth. May upgrade nearby tiles.
treez-restorative-rains=While it rains, nitrate pellets fall in chunks where pollution is being washed away, queued to fire the coming night. Disable in map settings if researched but unwanted.
treez-arboreal-aromatics=Study of the volatile organic compounds trees release and their interaction with rain-borne aerosols. When rain washes all pollution from a chunk, one tree seed is automatically scattered within it. Requires Dynamic Rain.
treez-primitive-nitrates=Unlocks the Local Nitrate Pellet which has the ability to restore soil health. Limited potential and area of effect. Consumed upon use, repeated applications required.
treez-enduring-nitrates=Each level adds a 10% chance (up to 30%) that a normal nitrate pellet survives firing and re-queues for the next night instead of being consumed. Does not apply to colored or local pellets.
soil-crystal=Allows the use of nitrate pellets to rejuvenate and heal damaged tiles. Plant on borders of damaged soil for best results. Consumed upon use, repeated applications required.
soil-crystal-catalyst=Unlock nitrate catalysts. Catalysts may randomly spawn from nitrate pellets and will cause other nitrate pellets to trigger earlier than normal.
soil-crystal-catalyst-abundant=Increases the chance that a placed pellet becomes a Nitrate Catalyst.
soil-crystal-catalyst-reactions=Extends both a catalyst's reach and the number of nearby pellets it triggers.
soil-crystal-white-pollution=Refines white nitrate pellets to reduce their pollution emissions.
