[entity-description]
tree-seed-site=Marks a location for automated tree planting. Include in a blueprint or shift-click to place a ghost. Construction robots will plant a tree seed here using seeds from your logistic network, respecting natural tree spacing.
soil-crystal-site=Expended to improve soil health. Apply near the borders of damaged soil patches. Repeated applications required.
soil-crystal-colored-site=Causes nearby wide nitrate pellets to activate early.
soil-crystal-black-site=A nitrate pellet affecting nearby tiles. Apply near the borders of damaged soil patches. Repeated applications required.
treez-seed-waiting=A tree seed queued to sprout when space and growing capacity allow. Mine to recover the seed and cancel the queued growth.

