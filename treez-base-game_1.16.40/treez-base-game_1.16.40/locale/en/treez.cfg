[mod-setting-description]
treez-crystal-delay-nights=How many nights a nitrate pellet waits before firing. Night length is read from the surface so mods that adjust the day/night cycle are respected.
treez-crystal-variance-nights=Random variation applied to each pellet's delay (±nights). Clamped so that delay − variance ≥ 1 night.
treez-crystal-batch-size=How many pellets are processed per check cycle (every 60 ticks).
treez-crystal-night-only=When enabled, pellets only fire during the night cycle. The Alien Biomes pollution decay pass always runs regardless of this setting.
treez-crystal-overflow-threshold=When more than this many pellets are queued, the processor drains a percentage of the queue each night.
treez-crystal-overflow-percent=The percentage of the queued pellets to fire per night while over the overflow threshold.
treez-tree-growth-speed=How long planted trees take to reach full size. Has no effect when Space Age is active.
treez-tree-growth-variability=How much each growth stage duration varies around the preset's base timing.
treez-tree-growth-max-active=Maximum number of trees simultaneously in a growth stage. Trees planted while the cap is full are queued and begin growing automatically as slots open. Has no effect when speed is Instant or Space Age is active.
treez-tree-growth-day-only=When enabled, trees only advance growth stages during the daytime cycle.
treez-tree-growth-pollution-delay=Higher pollution in a chunk causes longer delays between growth stages.
treez-rain-growth-boost=When enabled and Dynamic Rain is installed, trees progress through growth stages twice as fast while it is raining. Each tree's next growth check is scheduled at half the normal interval during rain.
treez-rain-seed-enabled=When enabled and Dynamic Rain is installed, seeds are automatically scattered in any chunk where rain has just removed all pollution. The number of seeds placed scales with Sapling Growth research (1–6).
treez-rain-seed-debug=When enabled, a notification is printed to all connected players whenever rain cleans a chunk of all pollution and when each seed is placed.
treez-restorative-rains-enabled=When disabled, Restorative Rains will not place nitrate pellets during storms even if the technology has been researched. Use this to turn off the mechanic without restarting your map.
treez-tree-growth-enrich-soil=Only active when "Tree growth delayed by pollution" is also enabled. Whenever a tree skips a growth tick due to pollution, it has that same percentage chance of upgrading the tile beneath it.
treez-trample-player-radius=Radius in tiles used to detect player foot trampling. Any pellet within this distance of the player's position when they move is destroyed. Smaller values require the player to be more directly on the pellet.
treez-fertilizer-trample=When enabled, nitrate pellets are destroyed without returning the item whenever they are disturbed: a player character walking over them (0.4-tile radius on foot; 1.5 for car, 2.0 for tank, 3.0 for spidertron), any entity damage (biter attacks), or a player manually mining the pellet. Robots are unaffected.
treez-randomize-upgrades=When enabled, a pellet picks its destination tile randomly from all tiles in the same colour-and-base-type group.
treez-foreign-tree-sweep=Once per day cycle scans for full-grown trees conflicting with ghosts and marks tree for deconstruction.
treez-crystal-colored-chance=1 in N chance of a catalyst spawning.
treez-crystal-pollution-rate=Pollution emitted per normal nitrate pellet per minute while it is waiting to fire. Set to 0 to disable entirely.

